<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背单词</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#fff;--bg2:#f5f5f5;--text:#1a1a1a;--text2:#666;--border:#e0e0e0;--accent:#1a1a1a;--ok:#4caf50;--no:#f44336}
        [data-theme="dark"]{--bg:#1a1a1a;--bg2:#2d2d2d;--text:#fff;--text2:#b0b0b0;--border:#404040;--accent:#fff}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        .page{display:none;flex:1;padding:20px 20px 80px}
        .page.active{display:block;animation:fade .3s ease}
        @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        h1{text-align:center;font-size:24px;margin-bottom:24px}
        .stats{display:flex;gap:12px;margin-bottom:24px}
        .stat{flex:1;background:var(--bg2);border-radius:12px;padding:16px 8px;text-align:center;border:1px solid var(--border)}
        .stat b{display:block;font-size:32px;margin-bottom:4px}
        .stat span{font-size:12px;color:var(--text2)}
        .btn{padding:14px 24px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
        .btn:hover{opacity:.9}
        .btn-prim{background:var(--accent);color:var(--bg)}
        .btn-sec{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
        .btn-block{width:100%}
        .btn-group{display:flex;gap:12px;margin-bottom:16px}
        .btn-group .btn{flex:1}
        .card{background:var(--bg2);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border)}
        .setting{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)}
        .setting:last-child{border-bottom:none}
        .switch{width:50px;height:28px;background:#ccc;border-radius:14px;cursor:pointer;position:relative;transition:.3s}
        .switch.on{background:var(--accent)}
        .switch::after{content:'';position:absolute;width:24px;height:24px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s}
        .switch.on::after{transform:translateX(22px)}
        .nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0}
        .nav-item{flex:1;text-align:center;padding:8px;cursor:pointer;color:var(--text2);font-size:12px}
        .nav-item.on{color:var(--text);font-weight:600}
        .nav-item div:first-child{font-size:20px;margin-bottom:2px}
        .word-card{background:var(--bg2);border-radius:16px;padding:32px 24px;text-align:center;margin-bottom:20px;border:1px solid var(--border);min-height:300px;display:flex;flex-direction:column;justify-content:center}
        .word{font-size:36px;font-weight:bold;margin-bottom:16px}
        .phonetic{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap;color:var(--text2)}
        .phonetic span{font-family:"Times New Roman",serif}
        .sound{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;margin-left:4px}
        .meaning{font-size:18px;margin-bottom:16px;line-height:1.6}
        .example{font-size:14px;color:var(--text2);font-style:italic}
        .progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
        .progress-bar{height:100%;background:var(--accent);transition:width .3s}
        .actions{display:flex;gap:12px}
        .actions .btn{flex:1;padding:16px}
        .btn-ok{background:var(--ok);color:#fff}
        .btn-no{background:var(--no);color:#fff}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th,td{padding:12px 8px;text-align:left;border-bottom:1px solid var(--border)}
        th{color:var(--text2);font-size:12px;font-weight:600}
        tr:hover{background:var(--bg2)}
        .badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600}
        .badge-wait{background:rgba(158,158,158,.2);color:var(--text2)}
        .badge-ok{background:rgba(76,175,80,.2);color:var(--ok)}
        .badge-no{background:rgba(244,67,54,.2);color:var(--no)}
        .level-btn{padding:8px 16px;border:1px solid var(--border);background:var(--bg2);border-radius:20px;cursor:pointer;font-size:14px}
        .level-btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
        .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .back-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text)}
        .empty{text-align:center;padding:48px 20px;color:var(--text2)}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
        .modal.on{display:flex}
        .modal-content{background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
        .modal h3{margin-bottom:16px}
        .modal p{margin-bottom:20px;color:var(--text2)}
        .modal-actions{display:flex;gap:12px}
        .modal-actions .btn{flex:1}
        textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;min-height:120px;background:var(--bg2);color:var(--text);font-family:inherit;margin-top:12px}
        .completion{text-align:center;padding:40px 20px}
        .completion h2{margin-bottom:16px}
        .completion p{color:var(--text2);margin-bottom:24px}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:var(--bg2)}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @media(max-width:480px){.page{padding:16px 16px 80px}.word{font-size:28px}}
    </style>
</head>
<body>
    <div class="app">
        <div id="home" class="page active">
            <h1>今日学习</h1>
            <div class="stats">
                <div class="stat"><b id="today">0</b><span>今日已学</span></div>
                <div class="stat"><b id="total">0</b><span>总单词量</span></div>
                <div class="stat"><b id="unknown">0</b><span>不认识单词</span></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-prim" onclick="app.go('card')">Target</button>
                <button class="btn btn-prim" onclick="app.go('list')">List</button>
            </div>
            <button class="btn btn-sec btn-block" onclick="app.showImport()">导入词库</button>
            <div class="card" style="margin-top:24px">
                <div class="setting"><span>夜间模式</span><div class="switch" id="dark-sw" onclick="app.toggleDark()"></div></div>
            </div>
            <div class="card">
                <div class="setting" style="border-bottom:1px solid var(--border);padding-top:0">
                    <span>当前词库</span>
                    <div>
                        <button class="level-btn" id="lv-cet4" onclick="app.setLevel('cet4')">四级</button>
                        <button class="level-btn" id="lv-cet6" onclick="app.setLevel('cet6')">六级</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="card" class="page">
            <div class="toolbar">
                <button class="back-btn" onclick="app.go('home')">← 返回</button>
                <span id="card-progress">0 / 0</span>
            </div>
            <div class="progress"><div class="progress-bar" id="card-bar" style="width:0%"></div></div>
            <div id="card-content">
                <div class="word-card">
                    <div class="word" id="w-word">Word</div>
                    <div class="phonetic">
                        <div>英 <span id="w-uk">/phonetic/</span><button class="sound" onclick="app.speak('uk')">🔊</button></div>
                        <div>美 <span id="w-us">/phonetic/</span><button class="sound" onclick="app.speak('us')">🔊</button></div>
                    </div>
                    <div class="meaning" id="w-mean">Meaning</div>
                    <div class="example"><div style="font-weight:600;margin-bottom:4px">例句</div><div id="w-ex">Example</div></div>
                </div>
                <div class="actions">
                    <button class="btn btn-no" onclick="app.mark(0)">✗ 不认识</button>
                    <button class="btn btn-ok" onclick="app.mark(1)">✓ 认识</button>
                </div>
            </div>
            <div id="card-done" class="completion" style="display:none">
                <h2>🎉 恭喜完成！</h2>
                <p>本词库所有单词已学习完毕</p>
                <button class="btn btn-prim btn-block" onclick="app.reset()">重新开始</button>
                <button class="btn btn-sec btn-block" onclick="app.go('home')" style="margin-top:12px">返回首页</button>
            </div>
        </div>

        <div id="list" class="page">
            <div class="toolbar">
                <button class="back-btn" onclick="app.go('home')">← 返回</button>
                <div>
                    <button class="level-btn" id="list-cet4" onclick="app.setListLevel('cet4')">四级</button>
                    <button class="level-btn" id="list-cet6" onclick="app.setListLevel('cet6')">六级</button>
                </div>
            </div>
            <h1 style="font-size:20px;margin-bottom:16px">单词列表</h1>
            <p style="text-align:center;color:var(--text2);margin-bottom:16px" id="list-info">共 0 个单词</p>
            <div style="overflow-x:auto">
                <table>
                    <thead><tr><th>单词</th><th>音标</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="wrong" class="page">
            <h1 style="font-size:20px">不认识单词</h1>
            <div id="wrong-content">
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>单词</th><th>释义</th><th>操作</th></tr></thead>
                        <tbody id="wrong-body"></tbody>
                    </table>
                </div>
                <button class="btn btn-no btn-block" style="margin-top:20px" onclick="app.clearWrong()">清空列表</button>
            </div>
            <div id="wrong-empty" class="empty" style="display:none">
                <div style="font-size:48px;margin-bottom:16px">📚</div>
                <p>还没有标记为不认识的单词</p>
            </div>
        </div>

        <div id="me" class="page">
            <h1>我的</h1>
            <div class="card">
                <div class="setting"><span>夜间模式</span><div class="switch" id="dark-sw2" onclick="app.toggleDark()"></div></div>
            </div>
            <div class="card">
                <div class="setting" style="border-bottom:1px solid var(--border)">
                    <span>重置学习进度</span>
                    <button class="btn btn-sec" style="padding:8px 16px;font-size:14px" onclick="app.confirm('重置学习进度','确定要重置当前词库的学习进度吗？',()=>app.doReset())">重置</button>
                </div>
                <div class="setting" style="border-bottom:1px solid var(--border)">
                    <span>清空不认识单词</span>
                    <button class="btn btn-sec" style="padding:8px 16px;font-size:14px" onclick="app.confirm('清空不认识单词','确定要清空所有标记为不认识的单词吗？',()=>app.clearWrong())">清空</button>
                </div>
                <div class="setting">
                    <span>导出词库</span>
                    <button class="btn btn-sec" style="padding:8px 16px;font-size:14px" onclick="app.export()">导出</button>
                </div>
            </div>
            <div class="card">
                <div class="setting" style="padding-top:0"><span>关于</span><span style="color:var(--text2)">背单词 v1.0</span></div>
            </div>
        </div>

        <nav class="nav">
            <div class="nav-item on" onclick="app.go('home')"><div>🏠</div><div>首页</div></div>
            <div class="nav-item" onclick="app.go('wrong')"><div>📖</div><div>不认识</div></div>
            <div class="nav-item" onclick="app.go('me')"><div>👤</div><div>我的</div></div>
        </nav>
    </div>

    <div class="modal" id="import-modal">
        <div class="modal-content">
            <h3>导入词库</h3>
            <p>格式：单词,音标,释义 或 JSON数组</p>
            <textarea id="import-txt" placeholder="abandon,əˈbændən,v. 放弃
ability,əˈbɪləti,n. 能力"></textarea>
            <div style="margin-top:12px">
                <button class="level-btn" id="imp-cet4" onclick="app.impLevel='cet4'">四级</button>
                <button class="level-btn" id="imp-cet6" onclick="app.impLevel='cet6'">六级</button>
            </div>
            <div class="modal-actions" style="margin-top:20px">
                <button class="btn btn-sec" onclick="app.hideImport()">取消</button>
                <button class="btn btn-prim" onclick="app.doImport()">导入</button>
            </div>
        </div>
    </div>

    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <h3 id="cf-title">确认</h3>
            <p id="cf-msg">确定要执行此操作吗？</p>
            <div class="modal-actions">
                <button class="btn btn-sec" onclick="app.hideConfirm()">取消</button>
                <button class="btn btn-prim" onclick="app.execConfirm()">确定</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_CET6=[{word:"abbreviate",phonetic_uk:"əˈbriːvieɪt",phonetic_us:"əˈbriːvieɪt",meaning:"v. 缩写，缩短",example:"The name Benjamin is often abbreviated to Ben."},{word:"abnormal",phonetic_uk:"æbˈnɔːml",phonetic_us:"æbˈnɔːrml",meaning:"adj. 异常的，反常的",example:"The test results showed an abnormal level of cholesterol."}];
        
        const app={
            lv:'cet4',listLv:'cet4',impLv:'cet4',idx:0,known:new Set,unknown:new Set,cfCb:null,
            
            async init(){
                this.loadSetting();
                await this.loadData();
                this.updateUI();
                this.bindEvent();
                if(location.search.includes('refresh=1')){
                    localStorage.removeItem('cet4_words');
                    localStorage.removeItem('cet4_ver');
                    await this.loadData();
                    this.updateUI();
                    history.replaceState({},'',location.pathname);
                }
            },
            
            loadSetting(){
                const s=localStorage.getItem('setting');
                if(s){
                    const p=JSON.parse(s);
                    this.lv=p.lv||'cet4';
                    if(p.dark)document.documentElement.setAttribute('data-theme','dark');
                }
            },
            
            saveSetting(){
                localStorage.setItem('setting',JSON.stringify({lv:this.lv,dark:document.documentElement.getAttribute('data-theme')==='dark'}));
            },
            
            async loadData(){
                const VER='v2',sv=localStorage.getItem('cet4_ver');
                if(!localStorage.getItem('cet4_words')||sv!==VER){
                    try{
                        const r=await fetch('cet4_words.json');
                        if(r.ok){
                            const w=await r.json();
                            localStorage.setItem('cet4_words',JSON.stringify(w));
                            localStorage.setItem('cet4_ver',VER);
                        }else throw new Error('fetch failed');
                    }catch(e){
                        localStorage.setItem('cet4_words','[]');
                        localStorage.setItem('cet4_ver',VER);
                    }
                }
                if(!localStorage.getItem('cet6_words'))localStorage.setItem('cet6_words',JSON.stringify(DEFAULT_CET6));
                if(!localStorage.getItem('prog'))localStorage.setItem('prog',JSON.stringify({cet4:{idx:0,known:[],unknown:[]},cet6:{idx:0,known:[],unknown:[]}}));
                if(!localStorage.getItem('wrong'))localStorage.setItem('wrong',JSON.stringify({cet4:[],cet6:[]}));
                if(!localStorage.getItem('daily'))localStorage.setItem('daily',JSON.stringify({}));
            },
            
            getWords(lv){const d=localStorage.getItem(lv+'_words');return d?JSON.parse(d):[]},
            saveWords(lv,w){localStorage.setItem(lv+'_words',JSON.stringify(w))},
            getProg(){const d=localStorage.getItem('prog');return d?JSON.parse(d):{cet4:{idx:0,known:[],unknown:[]},cet6:{idx:0,known:[],unknown:[]}}},
            saveProg(p){localStorage.setItem('prog',JSON.stringify(p))},
            getWrong(){const d=localStorage.getItem('wrong');return d?JSON.parse(d):{cet4:[],cet6:[]}},
            saveWrong(w){localStorage.setItem('wrong',JSON.stringify(w))},
            getDaily(){const d=localStorage.getItem('daily');return d?JSON.parse(d):{}},
            saveDaily(d){localStorage.setItem('daily',JSON.stringify(d))},
            today(){return new Date().toISOString().split('T')[0]},
            
            updateUI(){
                const w=this.getWords(this.lv),p=this.getProg(),r=this.getWrong(),d=this.getDaily();
                document.getElementById('today').textContent=d[this.today()]||0;
                document.getElementById('total').textContent=w.length;
                document.getElementById('unknown').textContent=(r.cet4?.length||0)+(r.cet6?.length||0);
                document.getElementById('lv-cet4').classList.toggle('on',this.lv==='cet4');
                document.getElementById('lv-cet6').classList.toggle('on',this.lv==='cet6');
                const isDark=document.documentElement.getAttribute('data-theme')==='dark';
                document.getElementById('dark-sw').classList.toggle('on',isDark);
                document.getElementById('dark-sw2').classList.toggle('on',isDark);
            },
            
            toggleDark(){
                const isDark=document.documentElement.getAttribute('data-theme')==='dark';
                if(isDark)document.documentElement.removeAttribute('data-theme');
                else document.documentElement.setAttribute('data-theme','dark');
                this.updateUI();
                this.saveSetting();
            },
            
            setLevel(lv){this.lv=lv;this.saveSetting();this.updateUI();},
            
            go(page){
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                document.getElementById(page).classList.add('active');
                document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('on',(page==='home'&&i===0)||(page==='wrong'&&i===1)||(page==='me'&&i===2)));
                if(page==='home')this.updateUI();
                if(page==='card')this.loadCard();
                if(page==='list')this.loadList();
                if(page==='wrong')this.loadWrong();
            },
            
            loadCard(){
                const w=this.getWords(this.lv),p=this.getProg()[this.lv];
                this.idx=p.idx||0;
                this.known=new Set(p.known||[]);
                this.unknown=new Set(p.unknown||[]);
                if(this.idx>=w.length)this.showDone();
                else this.showCard();
            },
            
            showCard(){
                const w=this.getWords(this.lv),word=w[this.idx];
                document.getElementById('card-content').style.display='block';
                document.getElementById('card-done').style.display='none';
                document.getElementById('w-word').textContent=word.word;
                document.getElementById('w-uk').textContent='/'+word.phonetic_uk+'/';
                document.getElementById('w-us').textContent='/'+word.phonetic_us+'/';
                document.getElementById('w-mean').textContent=word.meaning;
                document.getElementById('w-ex').textContent=word.example||'暂无例句';
                document.getElementById('card-progress').textContent=(this.idx+1)+' / '+w.length;
                document.getElementById('card-bar').style.width=((this.idx+1)/w.length*100)+'%';
            },
            
            showDone(){
                document.getElementById('card-content').style.display='none';
                document.getElementById('card-done').style.display='block';
            },
            
            mark(isKnown){
                if(isKnown)this.known.add(this.idx);
                else{this.unknown.add(this.idx);this.addWrong();}
                this.idx++;
                this.saveProg();
                this.recordDaily();
                this.loadCard();
            },
            
            addWrong(){
                const w=this.getWords(this.lv),word=w[this.idx],r=this.getWrong();
                if(!r[this.lv])r[this.lv]=[];
                if(!r[this.lv].find(x=>x.word===word.word))r[this.lv].push(word);
                this.saveWrong(r);
            },
            
            saveProg(){
                const p=this.getProg();
                p[this.lv]={idx:this.idx,known:[...this.known],unknown:[...this.unknown]};
                this.saveProg(p);
            },
            
            recordDaily(){
                const d=this.getDaily();
                d[this.today()]=(d[this.today()]||0)+1;
                this.saveDaily(d);
            },
            
            reset(){
                const p=this.getProg();
                p[this.lv]={idx:0,known:[],unknown:[]};
                this.saveProg(p);
                this.loadCard();
            },
            
            speak(type){
                const w=this.getWords(this.lv);
                if(this.idx>=w.length)return;
                if('speechSynthesis'in window){
                    const u=new SpeechSynthesisUtterance(w[this.idx].word);
                    u.lang=type==='uk'?'en-GB':'en-US';
                    u.rate=0.8;
                    speechSynthesis.speak(u);
                }
            },
            
            loadList(){
                const w=this.getWords(this.listLv),p=this.getProg()[this.listLv]||{known:[],unknown:[]};
                const known=new Set(p.known||[]),unknown=new Set(p.unknown||[]);
                document.getElementById('list-cet4').classList.toggle('on',this.listLv==='cet4');
                document.getElementById('list-cet6').classList.toggle('on',this.listLv==='cet6');
                document.getElementById('list-info').textContent='共 '+w.length+' 个单词';
                const tb=document.getElementById('list-body');
                tb.innerHTML=w.map((word,i)=>{
                    let cls='badge-wait',txt='○ 未学习';
                    if(known.has(i)){cls='badge-ok';txt='✓ 已认识';}
                    else if(unknown.has(i)){cls='badge-no';txt='✗ 不认识';}
                    return `<tr><td style="font-weight:600">${word.word}</td><td style="color:var(--text2);font-size:12px">/${word.phonetic_uk}/</td><td><span class="badge ${cls}">${txt}</span></td><td><button class="btn btn-prim" style="padding:6px 12px;font-size:12px" onclick="app.learn(${i})">学习</button></td></tr>`;
                }).join('');
            },
            
            setListLevel(lv){this.listLv=lv;this.loadList();},
            
            learn(i){
                this.lv=this.listLv;
                const p=this.getProg();
                p[this.lv].idx=i;
                this.saveProg(p);
                this.saveSetting();
                this.go('card');
            },
            
            loadWrong(){
                const r=this.getWrong(),all=[...r.cet4.map(w=>({...w,lv:'cet4'})),...r.cet6.map(w=>({...w,lv:'cet6'}))];
                document.getElementById('wrong-content').style.display=all.length?'block':'none';
                document.getElementById('wrong-empty').style.display=all.length?'none':'block';
                document.getElementById('wrong-body').innerHTML=all.map((w,i)=>`<tr><td style="font-weight:600">${w.word}</td><td>${w.meaning}</td><td><button class="btn btn-prim" style="padding:6px 12px;font-size:12px" onclick="app.learnWrong(${i},'${w.lv}')">学习</button></td></tr>`).join('');
            },
            
            learnWrong(i,lv){
                const r=this.getWrong(),w=r[lv][i];
                if(w){
                    const words=this.getWords(lv),idx=words.findIndex(x=>x.word===w.word);
                    if(idx!==-1){
                        this.lv=lv;
                        const p=this.getProg();
                        p[lv].idx=idx;
                        this.saveProg(p);
                        this.saveSetting();
                        this.go('card');
                    }
                }
            },
            
            clearWrong(){this.saveWrong({cet4:[],cet6:[]});this.loadWrong();this.updateUI();},
            
            showImport(){
                document.getElementById('import-modal').classList.add('on');
                document.getElementById('imp-cet4').classList.toggle('on',this.impLv==='cet4');
                document.getElementById('imp-cet6').classList.toggle('on',this.impLv==='cet6');
            },
            hideImport(){document.getElementById('import-modal').classList.remove('on');document.getElementById('import-txt').value='';},
            
            doImport(){
                const txt=document.getElementById('import-txt').value.trim();
                if(!txt){alert('请输入单词数据');return;}
                let words=[];
                try{words=JSON.parse(txt);if(!Array.isArray(words))throw new Error();}
                catch{words=txt.split('\n').map(l=>{const p=l.split(',');if(p.length>=2)return{word:p[0].trim(),phonetic_uk:p[1]?.trim()||'',phonetic_us:p[1]?.trim()||'',meaning:p[2]?.trim()||'',example:p[3]?.trim()||''};}).filter(Boolean);}
                if(!words.length){alert('未能解析出有效单词数据');return;}
                const exist=this.getWords(this.impLv),map=new Map(exist.map(w=>[w.word,w]));
                words.forEach(w=>{if(w.word)map.set(w.word,{word:w.word,phonetic_uk:w.phonetic_uk||w.phonetic||'',phonetic_us:w.phonetic_us||w.phonetic||'',meaning:w.meaning||w.definition||'',example:w.example||w.sentence||''});});
                this.saveWords(this.impLv,[...map.values()]);
                this.hideImport();
                this.updateUI();
                alert('成功导入 '+words.length+' 个单词');
            },
            
            export(){
                const data={cet4:this.getWords('cet4'),cet6:this.getWords('cet6'),date:new Date().toISOString()};
                const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
                const url=URL.createObjectURL(blob),a=document.createElement('a');
                a.href=url;a.download='words_'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(url);
            },
            
            confirm(t,m,cb){
                document.getElementById('cf-title').textContent=t;
                document.getElementById('cf-msg').textContent=m;
                document.getElementById('confirm-modal').classList.add('on');
                this.cfCb=cb;
            },
            hideConfirm(){document.getElementById('confirm-modal').classList.remove('on');this.cfCb=null;},
            execConfirm(){if(this.cfCb)this.cfCb();this.hideConfirm();},
            
            doReset(){
                const p=this.getProg();
                p[this.lv]={idx:0,known:[],unknown:[]};
                this.saveProg(p);
                this.updateUI();
            },
            
            bindEvent(){
                let sy=0;
                document.getElementById('card').addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
                document.getElementById('card').addEventListener('touchend',e=>{
                    const ey=e.changedTouches[0].clientY,d=sy-ey;
                    if(Math.abs(d)>50)d>0?this.mark(0):this.mark(1);
                },{passive:true});
                let wt=null;
                document.getElementById('card').addEventListener('wheel',e=>{
                    if(wt)return;
                    wt=setTimeout(()=>wt=null,300);
                    e.deltaY>0?this.mark(0):this.mark(1);
                },{passive:true});
            }
        };
        
        app.init();
    </script>
</body>
</html>
